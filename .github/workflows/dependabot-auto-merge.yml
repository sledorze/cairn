name: Dependabot auto-merge

# Automatically enables auto-merge on Dependabot PRs, scoped to patch/minor bumps only.
# Major version bumps are left for manual review — even with the CLI-startup coverage
# added in #19 (which validated that a real major bump, typescript 5.9.3 -> 7.0.2, didn't
# regress build/runtime perf), a major bump can still change behavior/types/API surface
# in ways this repo's bench + build-test gates don't fully cover (they check "still
# builds and isn't slower," not "still behaves identically"). Patch/minor bumps carry
# much lower risk of that, so auto-merging them once bench+build-test pass is a
# reasonable default; major bumps still benefit from a human glancing at the changelog.
#
# `pull_request_target` (not `pull_request`): needed so this workflow has permission to
# call `gh pr merge`, which `pull_request`'s restricted token can't do for a bot-authored
# PR. Safe here specifically because this workflow does nothing with the PR's own code —
# it only reads Dependabot's metadata and calls the merge API.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable auto-merge for patch/minor bumps
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
