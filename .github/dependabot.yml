version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      effect-dependencies:
        patterns:
          - '@effect/*'
          - 'effect'

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
